apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db
  labels:
    app: db
spec:
  serviceName: db
  replicas: 1
  selector:
    matchLabels:
     app: db
  template:
   metadata: 
     labels: 
      app: db
   spec:
    containers:
      - image: postgres:15-alpine
        name: postgres
        env: 
         - name: POSTGRES_USER
           valueFrom: 
            configMapKeyRef:
             name: config
             key: POSTGRES_USER
         - name: POSTGRES_PASSWORD
           valueFrom:
             secretKeyRef:
              name: secret
              key: POSTGRES_PASSWORD
        ports:
         - containerPort: 5432
           name: postgres
        volumeMounts:
         - mountPath: /var/lib/postgresql/data
           name: db-data

    volumesClaimTemaplates:
      - metadata: 
         name: db-data
        spec:
          acessModes: ["ReadWriteOnce"]
          resources:
            requests:
             storage: 1Gi
           
  